name: Commitlint

on:
  pull_request:
    branches:
      - master
      - develop
    types: [opened, reopened, synchronize, edited]

jobs:
  commitlint:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commits with commitlint
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD

      - name: Comment on PR if commitlint fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Commitlint validation failed**\n\nYour commit messages do not follow the conventional commit format.\n\nPlease ensure all commits follow the format:\n```\ntype(scope): subject\n```\n\nValid types: feat, fix, docs, style, refactor, perf, test, chore\n\nSee [CONTRIBUTING.md](../blob/develop/CONTRIBUTING.md#conventional-commits-enforced) for details.'
            })
