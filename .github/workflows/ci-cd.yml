name: CI/CD

on:
    push:
        branches:
            - main
            - develop
        tags:
            - "v*"
    pull_request:
        branches:
            - main
            - develop

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - run: npm ci
            - run: npm run lint

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - run: npm ci
            - run: npm run test -- --coverage

            - uses: codecov/codecov-action@v3
              with:
                  files: ./coverage/coverage-final.json

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v3
              with:
                  name: dist
                  path: packages/*/dist

    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - run: npm ci

            - name: Download build artifacts
              uses: actions/download-artifact@v3
              with:
                  name: dist
                  path: dist

            - name: Publish packages to npm
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN
                  npm publish --workspace packages/core
                  npm publish --workspace packages/react
                  npm publish --workspace packages/angular
                  npm publish --workspace packages/devtools

            - name: Create Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  body: |
                      See CHANGELOG.md for details.

                      ## Packages
                      - @polystate/core
                      - @polystate/react
                      - @polystate/angular
                      - @polystate/devtools
                  draft: false
                  prerelease: false
