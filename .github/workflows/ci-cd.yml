name: CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - develop

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        env:
          CI: true
          NX_SKIP_NX_CACHE: true
        run: pnpm nx run-many --target=test --all --parallel=1 --output-style=stream -- --passWithNoTests --coverage --run

      - uses: codecov/codecov-action@v3
        with:
          files: ./packages/angular/coverage/coverage-final.json,./packages/cli/coverage/coverage-final.json,./packages/core/coverage/coverage-final.json,./packages/definition/coverage/coverage-final.json,./packages/devtools/coverage/coverage-final.json,./packages/generator-angular/coverage/coverage-final.json,./packages/generator-react/coverage/coverage-final.json,./packages/react/coverage/coverage-final.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - name: Build publishable packages
        run: pnpm nx run-many --target=build --projects=@polystate/core,@polystate/react,@polystate/angular,@polystate/definition,@polystate/devtools,@polystate/generator-react,@polystate/generator-angular,@polystate/cli

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm nx run-many --target=build --projects=@polystate/core,@polystate/react,@polystate/angular,@polystate/definition,@polystate/devtools,@polystate/generator-react,@polystate/generator-angular,@polystate/cli

      - name: Prepare package manifests for dry run
        run: pnpm run fix-workspace-deps

      - name: Verify publish readiness
        run: node scripts/pre-publish-check.mjs

      - name: Dry run package publish
        run: |
          npm publish --workspace packages/core --dry-run
          npm publish --workspace packages/react --dry-run
          npm publish --workspace packages/angular --dry-run
          npm publish --workspace packages/devtools --dry-run

      - name: Restore workspace manifests
        if: always()
        run: pnpm run restore-workspace-deps

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm nx run-many --target=build --projects=@polystate/core,@polystate/react,@polystate/angular,@polystate/definition,@polystate/devtools,@polystate/generator-react,@polystate/generator-angular,@polystate/cli

      - name: Prepare package manifests for npm publish
        run: pnpm run fix-workspace-deps

      - name: Verify publish readiness
        run: node scripts/pre-publish-check.mjs

      - name: Publish packages to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN
          npm publish --workspace packages/core
          npm publish --workspace packages/react
          npm publish --workspace packages/angular
          npm publish --workspace packages/devtools

      - name: Restore workspace manifests
        if: always()
        run: pnpm run restore-workspace-deps

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            See CHANGELOG.md for details.

            ## Packages
            - @polystate/core
            - @polystate/react
            - @polystate/angular
            - @polystate/devtools
          draft: false
          prerelease: false
